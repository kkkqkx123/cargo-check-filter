# Custom Commands Configuration Example
# This example focuses on defining custom commands for various workflows

version = "1.0"

[global]
default_format = "markdown"
filter_warnings = false

# ============================================
# Rust/Cargo Custom Commands
# ============================================

# Security audit
[commands.audit]
exec = "cargo audit"
description = "Check dependencies for security vulnerabilities"
tech_stacks = ["cargo"]
enabled = true

# Outdated dependencies check
[commands.outdated]
exec = "cargo outdated"
description = "Check for outdated dependencies"
tech_stacks = ["cargo"]
enabled = true

# Format check (without modifying)
[commands.fmt-check]
exec = "cargo fmt -- --check"
description = "Check code formatting without modifying"
tech_stacks = ["cargo"]
enabled = true

# Format code
[commands.fmt]
exec = "cargo fmt"
description = "Format code automatically"
tech_stacks = ["cargo"]
enabled = true

# Documentation check
[commands.doc-check]
exec = "cargo doc --no-deps"
description = "Check documentation generation"
tech_stacks = ["cargo"]
enabled = true

# Run benchmarks
[commands.bench]
exec = "cargo bench"
description = "Run performance benchmarks"
tech_stacks = ["cargo"]
enabled = true

# Test coverage with tarpaulin
[commands.tarpaulin]
exec = "cargo tarpaulin --out Html --output-dir coverage"
description = "Generate test coverage report"
tech_stacks = ["cargo"]
enabled = true

# ============================================
# Node.js/NPM Custom Commands
# ============================================

# Lint with auto-fix
[commands.lint-fix]
exec = "npm run lint -- --fix"
description = "Run linter and auto-fix issues"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Format code with prettier
[commands.prettier]
exec = "npm run format"
description = "Format code with Prettier"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Check formatting
[commands.prettier-check]
exec = "npm run format:check"
description = "Check code formatting"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Run tests in watch mode
[commands.test-watch]
exec = "npm run test:watch"
description = "Run tests in watch mode"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Generate test coverage
[commands.test-coverage]
exec = "npm run test:coverage"
description = "Run tests with coverage report"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Bundle analysis
[commands.bundle-analyze]
exec = "npm run analyze"
description = "Analyze bundle size"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# ============================================
# Python/Mypy Custom Commands
# ============================================

# Strict type checking
[commands.mypy-strict]
exec = "mypy --strict --show-error-codes --pretty"
description = "Strict type checking with detailed output"
tech_stacks = ["mypy"]
enabled = true

# Type check specific directory
[commands.mypy-src]
exec = "mypy src/ --strict"
description = "Type check src directory"
tech_stacks = ["mypy"]
enabled = true

# ============================================
# Go Custom Commands
# ============================================

# Format code
[commands.gofmt]
exec = "gofmt -w ."
description = "Format Go code"
tech_stacks = ["go"]
enabled = true

# Check formatting
[commands.gofmt-check]
exec = "gofmt -l ."
description = "Check Go formatting"
tech_stacks = ["go"]
enabled = true

# Run linter
[commands.golangci-lint]
exec = "golangci-lint run"
description = "Run golangci-lint"
tech_stacks = ["go"]
enabled = true

# ============================================
# Development Workflow Commands
# ============================================

# Full CI check for Rust
[commands.ci-check]
exec = "cargo fmt -- --check && cargo clippy -- -D warnings && cargo test"
description = "Full CI check: format, lint, test"
tech_stacks = ["cargo"]
enabled = true

# Full CI check for Node.js
[commands.ci-check-js]
exec = "npm run lint && npm run type-check && npm run test"
description = "Full CI check: lint, type-check, test"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Pre-commit check
[commands.pre-commit]
exec = "npm run lint:fix && npm run format && npm run test"
description = "Pre-commit: fix lint, format, test"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true
