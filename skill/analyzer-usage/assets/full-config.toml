# Full Configuration Example
# This example demonstrates all available configuration options

version = "1.0"

# ============================================
# Global Settings
# ============================================
[global]
# Default output format: markdown, json, html
default_format = "markdown"

# Filter warnings by default (only show errors)
filter_warnings = false

# Default output file path
default_output = "analysis_report.md"

# ============================================
# Override Built-in Commands
# ============================================

# Override cargo check to check all targets
[commands.check]
exec = "cargo check --all-targets --all-features"
description = "Check all targets and features"
tech_stacks = ["cargo"]
enabled = true

# Override clippy to deny all warnings
[commands.clippy]
exec = "cargo clippy -- -D warnings"
description = "Run Clippy with strict warnings"
tech_stacks = ["cargo"]
enabled = true

# Override test to run with all features
[commands.test]
exec = "cargo test --all-features"
description = "Run tests with all features"
tech_stacks = ["cargo"]
enabled = true

# Override npm lint to use strict mode
[commands.lint]
exec = "npm run lint:strict"
description = "Run linter in strict mode"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Override type-check to use custom script
[commands.type-check]
exec = "npm run typecheck"
description = "Run TypeScript type checker"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# ============================================
# Custom Commands
# ============================================

# Custom command: Run linter with auto-fix
[commands.lint-fix]
exec = "npm run lint -- --fix"
description = "Run linter with auto-fix"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Custom command: Generate test coverage
[commands.test-coverage]
exec = "cargo tarpaulin --out Html"
description = "Generate test coverage report"
tech_stacks = ["cargo"]
enabled = true

# Custom command: Run benchmarks
[commands.bench]
exec = "cargo bench"
description = "Run performance benchmarks"
tech_stacks = ["cargo"]
enabled = true

# Custom command: Security audit for Rust
[commands.cargo-audit]
exec = "cargo audit"
description = "Check for security vulnerabilities"
tech_stacks = ["cargo"]
enabled = true

# Custom command: Format check
[commands.fmt-check]
exec = "cargo fmt -- --check"
description = "Check code formatting"
tech_stacks = ["cargo"]
enabled = true

# ============================================
# Tech Stack Specific Configuration
# ============================================

# Cargo (Rust) specific configuration
[tech_stack.cargo]

# Override check command for cargo only
[tech_stack.cargo.commands.check]
exec = "cargo check --all-targets --all-features --release"
description = "Check in release mode"

# Custom command for cargo only
[tech_stack.cargo.commands.clippy-strict]
exec = "cargo clippy --all-targets --all-features -- -D warnings -D clippy::all"
description = "Ultra-strict Clippy"
enabled = true

# NPM specific configuration
[tech_stack.npm]
test_framework = "jest"

# Override test command for npm
[tech_stack.npm.commands.test]
exec = "npm run test:coverage"
description = "Run tests with coverage"

# Script name mappings (for output parsing)
[tech_stack.npm.scripts]
"test" = "jest --coverage"
"lint" = "eslint . --ext .ts,.tsx,.js,.jsx"
"typecheck" = "tsc --noEmit"
"build" = "tsc"

# PNPM specific configuration
[tech_stack.pnpm]
test_framework = "vitest"

[tech_stack.pnpm.scripts]
"test" = "vitest run --coverage"
"lint" = "eslint . --ext .ts,.tsx"

# Yarn specific configuration
[tech_stack.yarn]
test_framework = "jest"

[tech_stack.yarn.scripts]
"test" = "yarn test --coverage"
"lint" = "yarn lint"

# Mypy (Python) specific configuration
[tech_stack.mypy]

# Override mypy to use strict mode
[tech_stack.mypy.commands.mypy]
exec = "mypy --strict --show-error-codes"
description = "Strict type checking with error codes"

# Custom mypy command for specific directory
[tech_stack.mypy.commands.mypy-src]
exec = "mypy src/ --strict"
description = "Type check src directory only"
enabled = true
