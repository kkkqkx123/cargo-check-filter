# Monorepo Configuration Example
# This is a realistic configuration for a TypeScript + Rust monorepo

version = "1.0"

# ============================================
# Global Settings
# ============================================
[global]
default_format = "markdown"
filter_warnings = false
default_output = "reports/analysis.md"

# ============================================
# Override Built-in Commands
# ============================================

# Use strict TypeScript checking
[commands.type-check]
exec = "npm run typecheck"
description = "TypeScript strict type checking"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Use strict linting
[commands.lint]
exec = "npm run lint:strict"
description = "ESLint with zero warnings"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# ============================================
# Custom Commands for Development Workflow
# ============================================

# Pre-commit checks
[commands.pre-commit]
exec = "npm run lint:fix && npm run format && npm run typecheck"
description = "Pre-commit: fix lint, format, type-check"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Full CI pipeline
[commands.ci]
exec = "npm run lint && npm run typecheck && npm run test:coverage"
description = "Full CI: lint, type-check, test with coverage"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# Security audit
[commands.security]
exec = "npm audit && npm run lint:security"
description = "Security audit and lint"
tech_stacks = ["npm", "pnpm", "yarn"]
enabled = true

# ============================================
# NPM Configuration
# ============================================
[tech_stack.npm]
test_framework = "jest"

[tech_stack.npm.scripts]
"test" = "jest --ci --coverage --reporters=default --reporters=jest-junit"
"lint" = "eslint . --ext .ts,.tsx --max-warnings 0"
"typecheck" = "tsc --noEmit --strict"
"format" = "prettier --write \"**/*.{ts,tsx,js,jsx,json,md}\""
"build" = "tsc --build"

# Custom npm commands
[tech_stack.npm.commands.test-watch]
exec = "jest --watch"
description = "Jest watch mode"
enabled = true

[tech_stack.npm.commands.test-update]
exec = "jest -u"
description = "Update snapshots"
enabled = true

# ============================================
# Cargo Configuration (for Rust parts)
# ============================================
[tech_stack.cargo]

[tech_stack.cargo.commands.check]
exec = "cargo check --all-targets --all-features"
description = "Check all Rust targets"

[tech_stack.cargo.commands.clippy]
exec = "cargo clippy --all-targets --all-features -- -D warnings"
description = "Strict Clippy"

[tech_stack.cargo.commands.test]
exec = "cargo test --all-features"
description = "Test all features"

# Custom cargo commands
[tech_stack.cargo.commands.audit]
exec = "cargo audit"
description = "Security audit for dependencies"
enabled = true

[tech_stack.cargo.commands.outdated]
exec = "cargo outdated"
description = "Check for outdated dependencies"
enabled = true
