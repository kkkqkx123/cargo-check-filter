# Tech Stack Specific Configuration Example
# This example demonstrates tech stack-specific overrides and settings

version = "1.0"

[global]
default_format = "markdown"
filter_warnings = false

# ============================================
# Cargo (Rust) Configuration
# ============================================

[tech_stack.cargo]

# Override check for cargo projects
[tech_stack.cargo.commands.check]
exec = "cargo check --all-targets --all-features"
description = "Check all targets and features"

# Override clippy for cargo projects
[tech_stack.cargo.commands.clippy]
exec = "cargo clippy --all-targets --all-features -- -D warnings"
description = "Strict Clippy for all targets"

# Override test for cargo projects
[tech_stack.cargo.commands.test]
exec = "cargo test --all-features --no-fail-fast"
description = "Test all features, continue on failure"

# Custom cargo-only commands
[tech_stack.cargo.commands.clippy-pedantic]
exec = "cargo clippy -- -W clippy::pedantic"
description = "Clippy with pedantic lints"
enabled = true

[tech_stack.cargo.commands.doc]
exec = "cargo doc --no-deps --open"
description = "Generate and open documentation"
enabled = true

# ============================================
# NPM Configuration
# ============================================

[tech_stack.npm]
test_framework = "jest"

# Override commands for npm projects
[tech_stack.npm.commands.lint]
exec = "npm run lint:strict"
description = "Strict linting for npm"

[tech_stack.npm.commands.type-check]
exec = "npm run typecheck"
description = "TypeScript type check"

[tech_stack.npm.commands.test]
exec = "npm run test:ci"
description = "CI test run"

# Script mappings for output parsing
[tech_stack.npm.scripts]
"test" = "jest --ci --coverage"
"lint" = "eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0"
"typecheck" = "tsc --noEmit --strict"
"build" = "tsc --build"
"format" = "prettier --write ."

# Custom npm-only commands
[tech_stack.npm.commands.lint-fix]
exec = "npm run lint -- --fix"
description = "Auto-fix linting issues"
enabled = true

[tech_stack.npm.commands.test-watch]
exec = "npm run test -- --watch"
description = "Watch mode testing"
enabled = true

# ============================================
# PNPM Configuration
# ============================================

[tech_stack.pnpm]
test_framework = "vitest"

# Override commands for pnpm projects
[tech_stack.pnpm.commands.lint]
exec = "pnpm run lint:strict"
description = "Strict linting for pnpm"

[tech_stack.pnpm.commands.test]
exec = "pnpm run test:run"
description = "Run tests once"

# Script mappings
[tech_stack.pnpm.scripts]
"test" = "vitest run --coverage"
"lint" = "eslint . --ext .ts,.tsx"
"typecheck" = "tsc --noEmit"
"build" = "vite build"

# Custom pnpm-only commands
[tech_stack.pnpm.commands.test-ui]
exec = "vitest --ui"
description = "Vitest UI mode"
enabled = true

# ============================================
# Yarn Configuration
# ============================================

[tech_stack.yarn]
test_framework = "jest"

# Override commands for yarn projects
[tech_stack.yarn.commands.lint]
exec = "yarn lint:strict"
description = "Strict linting for yarn"

[tech_stack.yarn.commands.test]
exec = "yarn test:ci"
description = "CI test run"

# Script mappings
[tech_stack.yarn.scripts]
"test" = "jest --ci"
"lint" = "eslint ."
"typecheck" = "tsc --noEmit"

# ============================================
# Mypy (Python) Configuration
# ============================================

[tech_stack.mypy]

# Override mypy command
[tech_stack.mypy.commands.mypy]
exec = "mypy --strict --show-error-codes --show-column-numbers"
description = "Strict mypy with detailed output"

# Custom mypy commands
[tech_stack.mypy.commands.mypy-src]
exec = "mypy src/ --strict"
description = "Type check src only"
enabled = true

[tech_stack.mypy.commands.mypy-tests]
exec = "mypy tests/ --ignore-missing-imports"
description = "Type check tests"
enabled = true

# ============================================
# Go Configuration
# ============================================

[tech_stack.go]

# Override go commands
[tech_stack.go.commands.build]
exec = "go build -v ./..."
description = "Build all packages"

[tech_stack.go.commands.test]
exec = "go test -v -race -coverprofile=coverage.out ./..."
description = "Test with race detection and coverage"

[tech_stack.go.commands.vet]
exec = "go vet ./..."
description = "Run go vet on all packages"

# Custom go commands
[tech_stack.go.commands.lint]
exec = "golangci-lint run --enable-all"
description = "Run all linters"
enabled = true

[tech_stack.go.commands.fmt]
exec = "gofmt -w ."
description = "Format all Go files"
enabled = true

# ============================================
# Maven (Java) Configuration
# ============================================

[tech_stack.maven]

# Override maven commands
[tech_stack.maven.commands.compile]
exec = "mvn clean compile -DskipTests"
description = "Clean compile without tests"

[tech_stack.maven.commands.test]
exec = "mvn test -Dmaven.test.failure.ignore=true"
description = "Run tests, continue on failure"

# Custom maven commands
[tech_stack.maven.commands.verify]
exec = "mvn verify"
description = "Run all verification checks"
enabled = true

[tech_stack.maven.commands.package]
exec = "mvn package -DskipTests"
description = "Package without tests"
enabled = true

# ============================================
# Gradle (Java) Configuration
# ============================================

[tech_stack.gradle]

# Override gradle commands
[tech_stack.gradle.commands.compile]
exec = "gradle clean compileJava -x test"
description = "Clean compile without tests"

[tech_stack.gradle.commands.test]
exec = "gradle test --continue"
description = "Run tests, continue on failure"

# Custom gradle commands
[tech_stack.gradle.commands.build]
exec = "gradle build -x test"
description = "Build without tests"
enabled = true

[tech_stack.gradle.commands.check]
exec = "gradle check"
description = "Run all checks"
enabled = true
